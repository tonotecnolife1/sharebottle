<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7e6d8" />
      <stop offset="50%" stop-color="#e4a3b0" />
      <stop offset="100%" stop-color="#9a7bbb" />
    </linearGradient>
    <linearGradient id="silhouette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1118" />
      <stop offset="100%" stop-color="#3d2f3a" />
    </linearGradient>
    <linearGradient id="rimLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0" />
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.85" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgC)" />

  <!-- Sparkles -->
  <g opacity="0.45" fill="#fdfcf9">
    <circle cx="155" cy="40" r="1.4" />
    <circle cx="40" cy="55" r="1.2" />
    <circle cx="170" cy="100" r="1" />
    <circle cx="35" cy="135" r="1.3" />
    <circle cx="155" cy="155" r="1.1" />
  </g>

  <!--
    Profile silhouette facing left.
    The silhouette includes head + neck + shoulder + hair updo.
  -->
  <path d="
    M 75 200
    L 75 165
    Q 75 140 90 130
    Q 95 125 95 115
    Q 78 110 75 95
    Q 70 80 78 65
    Q 82 50 95 45
    Q 100 40 110 38
    Q 125 36 135 50
    Q 142 60 138 75
    Q 152 78 155 70
    Q 158 65 162 70
    Q 160 88 145 92
    Q 142 100 138 108
    Q 132 116 125 120
    Q 122 130 130 140
    Q 145 155 145 200
    Z
  " fill="url(#silhouette)" />

  <!-- Hair updo bun (separate sphere on top) -->
  <ellipse cx="118" cy="40" rx="14" ry="11" fill="url(#silhouette)" />

  <!-- Kanzashi hair pin -->
  <g transform="translate(132 38)">
    <circle cx="0" cy="0" r="3" fill="#c9a84c" />
    <circle cx="0" cy="0" r="1.5" fill="#fdfcf9" />
  </g>

  <!-- Rim light on the back of the head/neck -->
  <path d="
    M 145 70
    Q 158 75 160 95
    Q 158 110 148 118
    Q 142 125 138 132
  " stroke="url(#rimLight)" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- Subtle face line hint (nose curve) — barely visible warm tone -->
  <path d="M 78 82 Q 73 85 74 90 Q 75 92 78 92" stroke="#c98d80" stroke-width="0.8" fill="none" opacity="0.3" />

  <!-- Lips hint -->
  <path d="M 76 100 Q 79 102 82 100" stroke="#a6695c" stroke-width="0.8" fill="none" opacity="0.4" />

  <!-- Subtle eyelash hint -->
  <line x1="80" y1="88" x2="78" y2="89" stroke="#1a1118" stroke-width="0.6" stroke-linecap="round" opacity="0.5" />

  <!-- Cherry blossom petal floating decoration -->
  <g transform="translate(45 90)" opacity="0.7">
    <circle cx="0" cy="0" r="2.5" fill="#e4a3b0" />
    <circle cx="-1.8" cy="-1" r="1.8" fill="#f2c9d1" />
    <circle cx="1.8" cy="-1" r="1.8" fill="#f2c9d1" />
    <circle cx="0" cy="2" r="1.8" fill="#f2c9d1" />
  </g>
  <g transform="translate(160 130)" opacity="0.6">
    <circle cx="0" cy="0" r="2" fill="#e4a3b0" />
    <circle cx="-1.5" cy="-0.8" r="1.4" fill="#f2c9d1" />
    <circle cx="1.5" cy="-0.8" r="1.4" fill="#f2c9d1" />
  </g>
</svg>
