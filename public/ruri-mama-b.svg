<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="bgB" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#fdf3eb" />
      <stop offset="40%" stop-color="#c98d80" />
      <stop offset="100%" stop-color="#3d2f3a" />
    </radialGradient>
    <linearGradient id="kimonoB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6e4f8f" />
      <stop offset="100%" stop-color="#2b232a" />
    </linearGradient>
    <linearGradient id="obiB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a6695c" />
      <stop offset="50%" stop-color="#c9a84c" />
      <stop offset="100%" stop-color="#a6695c" />
    </linearGradient>
    <linearGradient id="hairB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1118" />
      <stop offset="100%" stop-color="#3d2f3a" />
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="100" fill="url(#bgB)" />

  <!-- Subtle gold sparkles -->
  <g opacity="0.5" fill="#c9a84c">
    <circle cx="40" cy="50" r="1.2" />
    <circle cx="165" cy="65" r="1" />
    <circle cx="170" cy="135" r="1.3" />
    <circle cx="32" cy="150" r="1" />
    <circle cx="50" cy="180" r="1" />
  </g>

  <!-- Kimono body — wider, more graceful drape -->
  <path d="M 30 200 L 48 130 Q 55 110 75 105 L 100 130 L 125 105 Q 145 110 152 130 L 170 200 Z"
        fill="url(#kimonoB)" stroke="#1a1118" stroke-width="0.6" />

  <!-- Gold thread accents on kimono (subtle pattern) -->
  <g stroke="#c9a84c" stroke-width="0.4" opacity="0.45" fill="none">
    <path d="M 65 145 Q 70 150 65 155" />
    <path d="M 135 145 Q 130 150 135 155" />
    <path d="M 70 175 Q 75 180 70 185" />
    <path d="M 130 175 Q 125 180 130 185" />
  </g>

  <!-- Obi -->
  <rect x="48" y="148" width="104" height="16" fill="url(#obiB)" />
  <line x1="48" y1="151" x2="152" y2="151" stroke="#c9a84c" stroke-width="0.6" opacity="0.7" />
  <line x1="48" y1="161" x2="152" y2="161" stroke="#c9a84c" stroke-width="0.6" opacity="0.7" />
  <!-- Obijime cord -->
  <line x1="48" y1="156" x2="152" y2="156" stroke="#fdfcf9" stroke-width="1.2" />

  <!-- Neck and collar (more pronounced V) -->
  <path d="M 88 108 L 100 138 L 112 108 Z" fill="#fdf3eb" />
  <path d="M 86 108 L 88 108 L 100 138 L 112 108 L 114 108"
        stroke="#fdfcf9" stroke-width="2" fill="none" />

  <!-- Hair sides (longer, more elegant) -->
  <path d="M 56 65 Q 50 105 70 135 L 88 122 Q 75 90 80 65 Z" fill="url(#hairB)" />
  <path d="M 144 65 Q 150 105 130 135 L 112 122 Q 125 90 120 65 Z" fill="url(#hairB)" />

  <!-- Face — more oval, mature proportions -->
  <ellipse cx="100" cy="80" rx="22" ry="28" fill="#fdf3eb" />

  <!-- Subtle face contour -->
  <path d="M 78 80 Q 82 105 100 110 Q 118 105 122 80"
        stroke="#e4a3b0" stroke-width="0.6" opacity="0.4" fill="none" />

  <!-- Cheek blush -->
  <ellipse cx="84" cy="90" rx="5" ry="3.5" fill="#e4a3b0" opacity="0.4" />
  <ellipse cx="116" cy="90" rx="5" ry="3.5" fill="#e4a3b0" opacity="0.4" />

  <!-- Hair front (asymmetric, sophisticated) -->
  <path d="M 78 65 Q 90 50 100 53 Q 116 48 124 65 Q 122 73 100 70 Q 80 73 78 65 Z"
        fill="url(#hairB)" />

  <!-- Hair updo (chignon, larger) -->
  <ellipse cx="100" cy="42" rx="18" ry="14" fill="url(#hairB)" />
  <!-- Side wisp -->
  <path d="M 82 50 Q 75 60 80 75" stroke="#1a1118" stroke-width="2" stroke-linecap="round" fill="none" />

  <!-- Kanzashi: gold ornament with red accent -->
  <g transform="translate(118 38)">
    <rect x="-1" y="-2" width="2" height="14" fill="#c9a84c" />
    <circle cx="0" cy="-3" r="3.5" fill="#a6695c" />
    <circle cx="0" cy="-3" r="2" fill="#c9a84c" />
    <circle cx="0" cy="-3" r="0.8" fill="#fdfcf9" />
  </g>

  <!-- Eyebrows: gentle arched -->
  <path d="M 86 78 Q 90 76 93 78" stroke="#1a1118" stroke-width="1.4" stroke-linecap="round" fill="none" />
  <path d="M 107 78 Q 110 76 114 78" stroke="#1a1118" stroke-width="1.4" stroke-linecap="round" fill="none" />

  <!-- Eyes: open, looking forward, with eye shadow -->
  <ellipse cx="89" cy="85" rx="3.5" ry="2" fill="#fdfcf9" />
  <ellipse cx="111" cy="85" rx="3.5" ry="2" fill="#fdfcf9" />
  <ellipse cx="89" cy="85" rx="2" ry="1.8" fill="#3d2f3a" />
  <ellipse cx="111" cy="85" rx="2" ry="1.8" fill="#3d2f3a" />
  <!-- Eye shine -->
  <circle cx="89.5" cy="84.3" r="0.6" fill="#fdfcf9" />
  <circle cx="111.5" cy="84.3" r="0.6" fill="#fdfcf9" />

  <!-- Eyelid shadow (eyeshadow hint) -->
  <path d="M 85.5 83 Q 89 82 92.5 83" stroke="#6e4f8f" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.5" />
  <path d="M 107.5 83 Q 111 82 114.5 83" stroke="#6e4f8f" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.5" />

  <!-- Nose -->
  <path d="M 99 92 Q 100 98 101 92" stroke="#c98d80" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.5" />

  <!-- Lips: more prominent, deeper red -->
  <path d="M 93 102 Q 100 105 107 102 Q 100 107 93 102 Z" fill="#a6695c" />
  <path d="M 93 102 Q 100 100 107 102" stroke="#a6695c" stroke-width="0.8" stroke-linecap="round" fill="none" />
  <!-- Highlight -->
  <path d="M 97 103 Q 100 102 103 103" stroke="#c98d80" stroke-width="0.5" stroke-linecap="round" fill="none" opacity="0.6" />
</svg>
